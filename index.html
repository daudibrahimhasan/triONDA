      <main style="max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem; font-family: Inter, system-ui, -apple-system, sans-serif; line-height: 1.6; color: #123524;">
        <h1>TRIONDA — World Cup 2026 Machine-Learning Match Predictor</h1>
        <p>
          TRIONDA is a free, open machine-learning system that predicts the winner,
          scoreline and goalscorers of every 2026 FIFA World Cup match. It is validated
          blind against tournaments it never trained on. No paid data, no betting odds.
        </p>
        <h2>How it works</h2>
        <p>
          Each match becomes 140+ point-in-time features (form, squad quality, style,
          head-to-head, situational context). A panel of specialist sub-models is blended
          by a meta-learner, then adjusted for rivalry and host-city support. Every
          prediction ships with an honest confidence score and a chaos coefficient.
        </p>
        <h2>Tested blind</h2>
        <ul>
          <li>World Cup 2026 group stage — 61.1%</li>
          <li>World Cup 2018 (blind) — 60.4%</li>
          <li>551 held-out tournament matches — 58.4%</li>
          <li>Knockout advancement — 77.4%</li>
        </ul>
      </main>
    </noscript>
